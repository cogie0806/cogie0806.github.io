            document.getElementById("tokei").textContent = h + ":" + m + ":" + s;
        }
        setInterval(tokeiWoUgokasul, 1000);
        tokeiWoUgokasul();


        function addComment() {
            const inputTag = document.getElementById("comment-input");
            const commentText = inputTag.value; 

            if (commentText === "") return; 

            const newBox = document.createElement("div");
            newBox.className = "comment-box";
            newBox.textContent = commentText;

            const listTag = document.getElementById("comment-list");
            listTag.insertBefore(newBox, listTag.firstChild);

            inputTag.value = "";
        }

        /* ⏱ タイマー用のJavaScript処理 */
        let timerCountdown;
        let timeLeft = 0;

        function updateTimerDisplay() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            if (minutes < 10) minutes = "0" + minutes;
            if (seconds < 10) seconds = "0" + seconds;
            document.getElementById("timer-display").textContent = minutes + ":" + seconds;
        }

        function startTimer() {
            // すでに動いているタイマーがあれば止める
            clearInterval(timerCountdown);

            const inputVal = document.getElementById("timer-input").value;
            
            // 残り時間が0、または新しい秒数が入力されたら時間をセット
            if (timeLeft <= 0 || inputVal !== "") {
                timeLeft = parseInt(inputVal, 10);
                document.getElementById("timer-input").value = ""; // 入力欄をクリア
            }

            // 数字が正しくない場合は処理しない
            if (isNaN(timeLeft) || timeLeft <= 0) {
                alert("有効な秒数を入力してください！");
                return;
            }

            updateTimerDisplay();

            // 1秒ごとにカウントダウンする
            timerCountdown = setInterval(function() {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerCountdown);
                    alert("⏰ 時間になりました！");
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerCountdown);
        }
