    <script>
        // 1. 🕒 時計とあいさつの機能
        function tokeiWoUgokasul() {
            const ima = new Date(); 
            let h = ima.getHours();
            let m = ima.getMinutes();
            let s = ima.getSeconds();
            
            const aisatsuTag = document.getElementById("aisatsu");
            if (h >= 5 && h < 11) {
                aisatsuTag.textContent = "おはようございます！";
            } else if (h >= 11 && h < 18) {
                aisatsuTag.textContent = "こんにちは！";
            } else {
                aisatsuTag.textContent = "こんばんは！";
            }

            let year = ima.getFullYear();
            let month = ima.getMonth() + 1; 
            let date = ima.getDate();
            let dayNum = ima.getDay(); 
            const yoobi = ["日", "月", "火", "水", "木", "金", "土"];

            if (month < 10) month = "0" + month;
            if (date < 10) date = "0" + date;
            if (h < 10) h = "0" + h;
            if (m < 10) m = "0" + m;
            if (s < 10) s = "0" + s;
            
            document.getElementById("hizuke").textContent = year + "年" + month + "月" + date + "日（" + yoobi[dayNum] + "）";
            document.getElementById("tokei").textContent = h + ":" + m + ":" + s;
        }
        setInterval(tokeiWoUgokasul, 1000);
        tokeiWoUgokasul();

        // 2. 💬 コメントの機能
        function addComment() {
            const inputTag = document.getElementById("comment-input");
            const commentText = inputTag.value; 

            if (commentText === "") return; 

            const newBox = document.createElement("div");
            newBox.className = "comment-box";
            newBox.textContent = commentText;

            const listTag = document.getElementById("comment-list");
            listTag.insertBefore(newBox, listTag.firstChild);

            inputTag.value = "";
        }

        // 3. ⏱ タイマーの機能
        let timerCountdown;
        let timeLeft = 0;

        function updateTimerDisplay() {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            if (minutes < 10) minutes = "0" + minutes;
            if (seconds < 10) seconds = "0" + seconds;
            document.getElementById("timer-display").textContent = minutes + ":" + seconds;
        }

        function startTimer() {
            clearInterval(timerCountdown);
            const inputVal = document.getElementById("timer-input").value;
            
            if (timeLeft <= 0 || inputVal !== "") {
                timeLeft = parseInt(inputVal, 10);
                document.getElementById("timer-input").value = "";
            }

            if (isNaN(timeLeft) || timeLeft <= 0) {
                alert("有効な秒数を入力してください！");
                return;
            }

            updateTimerDisplay();

            timerCountdown = setInterval(function() {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerCountdown);
                    alert("⏰ 時間になりました！");
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerCountdown);
        }

        // 4. 🧮 電卓の機能
        const screen = document.getElementById("calc-screen");
        let currentInput = "0"; 
        let formula = "";      

        function pressNum(val) {
            if (currentInput === "0" && val !== ".") {
                currentInput = val;
            } else {
                currentInput += val;
            }
            formula += val;
            screen.value = currentInput;
        }

        function pressOperator(op) {
            let displayOp = "";
            if (op === "+") displayOp = " ＋ ";
            if (op === "-") displayOp = " － ";
            if (op === "*") displayOp = " × ";
            if (op === "/") displayOp = " ÷ ";

            currentInput = "0";
            formula += op;
            screen.value = displayOp;
        }

        function clearCalc() {
            currentInput = "0";
            formula = "";
            screen.value = "0";
        }

        function calculate() {
            try {
                if (formula === "") return;
                const result = new Function('return ' + formula)();
                screen.value = Number(result.toFixed(4)); 
                currentInput = screen.value;
                formula = screen.value;
            } catch (error) {
                screen.value = "エラー";
                formula = "";
                currentInput = "0";
            }
        }

        // 5. 🎨 ペイントエディタの機能（ポップアップ制御）
        const modal = document.getElementById('paintModal');
        let canvas, ctx, colorPicker, lineWidth, drawing = false, currentMode = 'select', startX, startY, snapshot;

        function openPaint() {
            modal.style.display = 'flex';
            if (!canvas) initPaint(); // 開いたときに一回だけキャンバスを設定する
        }
        function closePaint() { modal.style.display = 'none'; }

        function initPaint() {
            canvas = document.getElementById('paintCanvas');
            ctx = canvas.getContext('2d');
            colorPicker = document.getElementById('colorPicker');
            lineWidth = document.getElementById('lineWidth');
            
            // 最初は背景を真っ白にする
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // イベントを登録する
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stopDrawing);

            // ゴミ箱ボタンの処理
            document.getElementById('clearBtn').addEventListener('click', () => {
                if (confirm('ぜんぶ消しちゃって大丈夫？')) {
                    ctx.fillStyle = "#ffffff";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
            });

            // 💾 画像を保存ボタンの処理
            document.getElementById('downloadBtn').addEventListener('click', () => {
                const imageURI = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'my_scratch_picture.png';
                link.href = imageURI;
                link.click();
            });
            
            document.getElementById('select').classList.add('active-purple');
        }

        function setMode(btn) {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active-purple'));
            btn.classList.add('active-purple');
            currentMode = btn.id;
        }

        function startDrawing(e) {
            drawing = true;
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            if (currentMode === 'brush' || currentMode === 'eraser') {
                draw(e);
            }
        }

        function draw(e) {
            if (!drawing) return;

            const rect = canvas.getBoundingClientRect();
            const currentX = e.clientX - rect.left;
            const currentY = e.clientY - rect.top;

            ctx.lineWidth = lineWidth.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (currentMode === 'brush') {
                ctx.strokeStyle = colorPicker.value;
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            } 
            else if (currentMode === 'eraser') {
                ctx.strokeStyle = '#ffffff';
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            } 
            else if (currentMode === 'line') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.strokeStyle = colorPicker.value;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(currentX, currentY);
                ctx.stroke();
            } 
            else if (currentMode === 'rect') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.strokeStyle = colorPicker.value;
                ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
            } 
            else if (currentMode === 'circle') {
                ctx.putImageData(snapshot, 0, 0);
                ctx.strokeStyle = colorPicker.value;
                ctx.beginPath();
                let radius = Math.sqrt(Math.pow(currentX - startX, 2) + Math.pow(currentY - startY, 2));
                ctx.arc(startX, startY, radius, 0, 2 * Math.PI);
                ctx.stroke();
            }
        }

        function stopDrawing(e) {
            if (!drawing) return;
            drawing = false;
            const rect = canvas.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;

            if (currentMode === 'bucket') {
                ctx.fillStyle = colorPicker.value;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            else if (currentMode === 'text') {
                let text = prompt("いれたい文字を入力してね：");
                if (text) {
                    ctx.fillStyle = colorPicker.value;
                    ctx.font = `${lineWidth.value * 3}px sans-serif`;
                    ctx.fillText(text, endX, endY);
                }
            }
            else if (currentMode === 'select' || currentMode === 'reshape') {
                alert(`「${currentMode === 'select' ? '選択' : '形を変える'}」モードが選ばれたよ！`);
            }

            ctx.beginPath();
        }
    </script>
